[workspace]
authors = ["akoen <git@koen.ca>"]
channels = ["conda-forge"]
name = "basalt"
platforms = ["linux-64"]
preview = ["pixi-build"]


[tasks]
conf = 'cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_PREFIX_PATH="$CONDA_PREFIX" -DCMAKE_INSTALL_PREFIX="$PWD" -DCMAKE_EXPORT_COMPILE_COMMANDS=TRUE'
build = "cmake --build build -j 8 && cmake --install build"
# Preserve `basalt/_core/__init__.py` (a source-tracked package marker that
# scikit-build-core's editable install registers as a module).
clean = "rm -rf build _deps && find basalt/_core -mindepth 1 -not -name __init__.py -delete 2>/dev/null; true"

# Make the conda env discoverable to CMake during the scikit-build-core
# editable install (`pixi install` triggers it; the build subprocess inherits
# this env var). Without it, find_library(gmsh) and friends fail because the
# build env's CMAKE_PREFIX_PATH only points at scikit-build-core's bootstrap
# site-packages, not the activated conda env.
[activation.env]
CMAKE_PREFIX_PATH = "$CONDA_PREFIX"

[pypi-dependencies]
nanobindgen = ">=0.2.0,<1"
basalt-mesh = { path = ".", editable = true }
ipykernel = ">=7.1.0, <8"

[dependencies]
python = "3.12.*"
nanobind = ">=2.9.2,<3"
gmsh = ">=4.13.1,<5"
stellarmesh = ">=2.0.0,<3"
openmc = { version = "==0.15.2", build = "dagmc_nompi*" }
nlohmann_json = ">=3.12.0,<4"
pytest = ">=8,<9"
# Tutorial-notebook runtime deps. The W7-X end-to-end tutorial at
# docs/notebooks/tutorials/w7x_neutronics.ipynb uses pyvista (3D render
# of the unstructured-mesh flux tally) and matplotlib. ipykernel above
# handles notebook execution.
pyvista = ">=0.43"
matplotlib = ">=3.8"
nbconvert = ">=7.17.1,<8"


[feature.docs.pypi-dependencies]
sphinx = ">=8.2.3,<10"
sphinx-github-style = ">=1.2.2,<2"
sphinx-autobuild = ">=2025.8.25,<2026"
shibuya = "==2026.1.9"
sphinx-tabs = ">=3.4.7,<4"
nbsphinx = ">=0.9.7,<0.10"

[feature.docs.dependencies]
pandoc = "*"

[feature.docs.tasks]
docs = "sphinx-build -b html docs docs/_build/html"
docs-watch = "sphinx-autobuild docs docs/_build/html"

[environments]
docs = ["docs"]


[package]
name = "basalt-mesh"
version = "0.1"
description = "Nuclear meshing library for NX and Parasolid based on the Simmetrix mesh suite"

[package.build]
backend = { name = "pixi-build-python", version = "0.4.*" }

[package.host-dependencies]
python = "3.12.*"
nanobind = ">=2.9.2,<3"
cmake = ">=3.15"
ninja = ">=1.11"
# scikit-build-core and nanobindgen come from build-system.requires in
# pyproject.toml (PyPI). pixi-build-python honors that list.

[package.run-dependencies]
python = "3.12.*"
nanobind = ">=2.9.2,<3"
gmsh = ">=4.13.1,<5"
