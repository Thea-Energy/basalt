[workspace]
authors = ["akoen <git@koen.ca>"]
channels = ["conda-forge"]
name = "basalt"
platforms = ["linux-64"]


[tasks]
# The editable install rebuilds the extension automatically on import
# (scikit-build-core editable.rebuild; build isolation is disabled so the rebuild
# uses the stable env interpreter — see [pypi-options]). No separate build task is
# needed for day-to-day edits. For a from-scratch rebuild run
# `pixi reinstall basalt-mesh` (a plain `pixi install` is a no-op once the package
# is already installed, so it will NOT reconfigure a wiped build dir). `clean`
# wipes the CMake cache + FetchContent deps; follow it with
# `pixi reinstall basalt-mesh`. Preserves tracked basalt/_core/__init__.py and _core.pyi.
clean = "rm -rf build _deps && find basalt/_core -mindepth 1 ! -name __init__.py ! -name _core.pyi -delete 2>/dev/null; true"

# Make the conda env discoverable to CMake during the scikit-build-core
# editable install (`pixi install` triggers it; the build subprocess inherits
# this env var). Without it, find_library(gmsh) and friends fail because the
# build env's CMAKE_PREFIX_PATH only points at scikit-build-core's bootstrap
# site-packages, not the activated conda env.
[activation.env]
CMAKE_PREFIX_PATH = "$CONDA_PREFIX"

# Build basalt-mesh without PEP 517 build isolation. scikit-build-core's editable
# rebuild-on-import re-runs `cmake --build` against the interpreter baked into the
# CMake cache at configure time; under an isolated build that interpreter is uv's
# ephemeral temp venv, which is deleted after install, so rebuilds fail. Disabling
# isolation makes the build use the stable pixi env interpreter. Requires the build
# backend + build reqs (scikit-build-core, nanobind, nanobindgen) to be in the env.
[pypi-options]
no-build-isolation = ["basalt-mesh"]

[pypi-dependencies]
nanobindgen = ">=0.2.0,<1"
basalt-mesh = { path = ".", editable = true }
ipykernel = ">=7.1.0, <8"

[dependencies]
python = "3.12.*"
nanobind = ">=2.9.2,<3"
# Build backend for basalt-mesh, in the env because build isolation is disabled
# (see [pypi-options].no-build-isolation).
scikit-build-core = ">=0.10"
cmake = ">=3.15"
ninja = ">=1.11"
# For producing the PyPI source distribution (`python -m build --sdist`).
python-build = ">=1.2"
gmsh = ">=4.13.1,<5"
stellarmesh = ">=2.0.0,<3"
openmc = { version = "==0.15.2", build = "dagmc_nompi*" }
nlohmann_json = ">=3.12.0,<4"
pytest = ">=8,<9"
# Tutorial-notebook runtime deps. The W7-X end-to-end tutorial at
# docs/notebooks/tutorials/w7x_neutronics.ipynb uses pyvista (3D render
# of the unstructured-mesh flux tally) and matplotlib. ipykernel above
# handles notebook execution.
pyvista = ">=0.43"
matplotlib = ">=3.8"
nbconvert = ">=7.17.1,<8"


[feature.docs.pypi-dependencies]
sphinx = ">=8.2.3,<10"
sphinx-github-style = ">=1.2.2,<2"
sphinx-autobuild = ">=2025.8.25,<2026"
shibuya = "==2026.1.9"
sphinx-tabs = ">=3.4.7,<4"
nbsphinx = ">=0.9.7,<0.10"

[feature.docs.dependencies]
pandoc = "*"

[feature.docs.tasks]
docs = "sphinx-build -b html docs docs/_build/html"
docs-watch = "sphinx-autobuild docs docs/_build/html"

[environments]
docs = ["docs"]
